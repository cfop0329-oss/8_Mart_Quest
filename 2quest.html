<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Динозаврик - С 8 Марта!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #FFB6C1 0%, #E6E6FA 50%, #FFC0CB 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        .game-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            padding: 20px;
        }

        /* Праздничный заголовок */
        .holiday-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .holiday-title {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(45deg, #FF69B4, #FFD700, #FF69B4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(255, 105, 180, 0.3);
            animation: shimmer 2s infinite;
        }

        .holiday-subtitle {
            font-size: 22px;
            color: #9370DB;
            margin-top: 5px;
            font-style: italic;
        }

        @keyframes shimmer {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.2); }
        }

        canvas {
            display: block;
            width: 100%;
            background: linear-gradient(180deg, #FFF0F5 0%, #FFE4E1 100%);
            border: 3px solid #FFB6C1;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(255, 105, 180, 0.3);
        }

        .score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 20px;
            color: #9370DB;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 20px;
            z-index: 10;
        }

        .message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #FFB6C1;
            box-shadow: 0 5px 20px rgba(255, 105, 180, 0.3);
            z-index: 20;
        }

        .message h2 {
            font-size: 28px;
            color: #FF69B4;
            margin-bottom: 10px;
        }

        .message p {
            font-size: 16px;
            color: #9370DB;
        }

        /* СЕКРЕТНОЕ ОКНО (Новое) */
        .secret-modal {
            display: none; /* Скрыто по умолчанию */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 240, 245, 0.95);
            border-radius: 15px;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            backdrop-filter: blur(5px);
            border: 4px solid #FFD700;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .secret-title {
            font-size: 32px;
            color: #FF69B4;
            margin-bottom: 20px;
            font-weight: bold;
            text-align: center;
        }

        .secret-symbols {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .symbol {
            font-size: 60px;
            animation: bounce 1s infinite alternate;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        .symbol:nth-child(2) { animation-delay: 0.2s; }
        .symbol:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        .continue-btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(45deg, #FF69B4, #9370DB);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 105, 180, 0.4);
            transition: transform 0.2s;
        }

        .continue-btn:active {
            transform: scale(0.95);
        }

        /* Декоративные элементы */
        .decoration {
            position: fixed;
            font-size: 30px;
            animation: float 3s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .flower-1 { top: 10%; left: 5%; animation-delay: 0s; }
        .flower-2 { top: 20%; right: 5%; animation-delay: 0.5s; }
        .flower-3 { bottom: 15%; left: 8%; animation-delay: 1s; }
        .flower-4 { bottom: 25%; right: 8%; animation-delay: 1.5s; }
        .heart-1 { top: 15%; left: 50%; animation-delay: 0.3s; }
        .heart-2 { bottom: 10%; left: 50%; animation-delay: 0.8s; }

        @media (max-width: 600px) {
            .holiday-title { font-size: 32px; }
            .holiday-subtitle { font-size: 18px; }
            .message h2 { font-size: 22px; }
            .message p { font-size: 14px; }
            .decoration { font-size: 24px; }
            .symbol { font-size: 50px; }
            .secret-title { font-size: 24px; }
        }
    </style>
</head>
<body>

<!-- Декоративные элементы -->
<div class="decoration flower-1">🌸</div>
<div class="decoration flower-2">🌺</div>
<div class="decoration flower-3">🌷</div>
<div class="decoration flower-4">🌹</div>
<div class="decoration heart-1">💖</div>
<div class="decoration heart-2">💕</div>

<div class="game-container">
    <!-- Праздничный заголовок -->
    <div class="holiday-header">
        <div class="holiday-title">С 8 МАРТА</div>
        <div class="holiday-subtitle">С праздником Рауан</div>
    </div>

    <canvas id="gameCanvas"></canvas>
    <div class="score">Счёт: <span id="scoreValue">0</span></div>
    
    <!-- Стартовое сообщение -->
    <div class="message" id="message">
        <h2>🌸 С 8 Марта! 🌸</h2>
        <p>Нажми на экран или Пробел для прыжка</p>
        <p style="margin-top: 10px; font-size: 14px;">💐 Для Рауан 💐</p>
    </div>

    <!-- СЕКРЕТНОЕ ОКНО (Скрыто) -->
    <div class="secret-modal" id="secretModal">
        <div class="secret-title">🎉 Секрет открыт! 🎉</div>
        <div class="secret-symbols">
            <!-- ИЗМЕНИТЬ СИМВОЛЫ ЗДЕСЬ -->
            <div class="symbol">W</div>
            <div class="symbol">8</div>
            <div class="symbol">T</div>
        </div>
        <button class="continue-btn" id="continueBtn">Продолжить</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('scoreValue');
    const messageElement = document.getElementById('message');
    const secretModal = document.getElementById('secretModal');
    const continueBtn = document.getElementById('continueBtn');

    // Настройки канваса
    canvas.width = 800;
    canvas.height = 300;

    // Переменные игры
    let gameRunning = false;
    let isPaused = false; // Для паузы при секрете
    let score = 0;
    let gameSpeed = 5;
    let frame = 0;
    let secretUnlocked = false; // Флаг секрета

    // Динозавр
    const dino = {
        x: 50,
        y: 0,
        width: 40,
        height: 40,
        dy: 0,
        jumpForce: 12,
        gravity: 0.6,
        grounded: false,
        color: '#FF69B4'
    };

    let obstacles = [];
    let particles = [];

    function initDino() {
        dino.y = canvas.height - dino.height;
        dino.dy = 0;
    }

    initDino();

    // Управление
    function jump() {
        if (isPaused) return; // Не прыгать во время паузы
        if (!gameRunning) {
            startGame();
            return;
        }
        if (dino.grounded) {
            dino.dy = -dino.jumpForce;
            dino.grounded = false;
            createParticles(dino.x + dino.width/2, dino.y + dino.height);
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.code === 'Space' || e.code === 'ArrowUp') {
            jump();
        }
    });

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        jump();
    });

    canvas.addEventListener('mousedown', () => {
        jump();
    });

    // Обработчик кнопки "Продолжить"
    continueBtn.addEventListener('click', () => {
        secretModal.style.display = 'none';
        isPaused = false;
        animate(); // Запускаем цикл снова
    });

    function createParticles(x, y) {
        for (let i = 0; i < 10; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 30,
                color: ['#FF69B4', '#FFD700', '#9370DB', '#FFB6C1'][Math.floor(Math.random() * 4)]
            });
        }
    }

    function startGame() {
        gameRunning = true;
        isPaused = false;
        score = 0;
        gameSpeed = 5;
        obstacles = [];
        particles = [];
        secretUnlocked = false; // Сброс секрета при новой игре
        messageElement.style.display = 'none';
        secretModal.style.display = 'none';
        scoreElement.innerText = score;
        initDino();
        animate();
    }

    function gameOver() {
        gameRunning = false;
        isPaused = true;
        messageElement.innerHTML = `
            <h2>💐 Игра окончена! 💐</h2>
            <p>Счёт: ${score}</p>
            <p style="margin-top: 10px;">Нажми чтобы начать заново</p>
            <p style="margin-top: 5px; font-size: 14px;">🌸 Для Рауан 🌸</p>
        `;
        messageElement.style.display = 'block';
    }

    // Функция показа секрета
    function showSecret() {
        secretUnlocked = true;
        isPaused = true; // Ставим игру на паузу
        secretModal.style.display = 'flex'; // Показываем окно
    }

    function spawnObstacle() {
        const height = Math.random() > 0.5 ? 30 : 50;
        obstacles.push({
            x: canvas.width,
            y: canvas.height - height,
            width: 25,
            height: height,
            color: '#9370DB'
        });
    }

    function update() {
        frame++;

        // Физика динозавра
        dino.dy += dino.gravity;
        dino.y += dino.dy;

        // Проверка земли
        if (dino.y + dino.height > canvas.height) {
            dino.y = canvas.height - dino.height;
            dino.dy = 0;
            dino.grounded = true;
        }

        // Препятствия
        if (frame % 100 === 0) {
            spawnObstacle();
            if (gameSpeed < 12) gameSpeed += 0.2;
        }

        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.x -= gameSpeed;

            // Столкновение
            if (
                dino.x < obs.x + obs.width &&
                dino.x + dino.width > obs.x &&
                dino.y < obs.y + obs.height &&
                dino.y + dino.height > obs.y
            ) {
                gameOver();
                return;
            }

            // Удаление и счёт
            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
                score++;
                scoreElement.innerText = score;
                
                // ПРОВЕРКА СЕКРЕТА (Счет 20)
                if (score === 20 && !secretUnlocked) {
                    showSecret();
                    return; // Прерываем update, чтобы не обновлялось пока на паузе
                }
                
                i--;
            }
        }

        // Обновление частиц
        for (let i = 0; i < particles.length; i++) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.5;
            p.life--;
            if (p.life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Градиентный фон
        const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, '#FFF0F5');
        gradient.addColorStop(1, '#FFE4E1');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Динозавр
        ctx.fillStyle = dino.color;
        ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
        
        // Глаз
        ctx.fillStyle = '#FFFFFF';
        ctx.beginPath();
        ctx.arc(dino.x + 30, dino.y + 10, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#000000';
        ctx.beginPath();
        ctx.arc(dino.x + 32, dino.y + 10, 2, 0, Math.PI * 2);
        ctx.fill();

        // Цветочная корона
        ctx.fillStyle = '#FF69B4';
        ctx.beginPath();
        ctx.arc(dino.x + 20, dino.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#FFD700';
        ctx.beginPath();
        ctx.arc(dino.x + 20, dino.y, 4, 0, Math.PI * 2);
        ctx.fill();

        // Препятствия
        for (let obs of obstacles) {
            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
        }

        // Частицы
        for (let p of particles) {
            ctx.fillStyle = p.color;
            ctx.beginPath();
            ctx.arc(p.x, p.y, 4, 0, Math.PI * 2);
            ctx.fill();
        }

        // Земля
        ctx.beginPath();
        ctx.moveTo(0, canvas.height);
        ctx.lineTo(canvas.width, canvas.height);
        ctx.strokeStyle = '#FFB6C1';
        ctx.lineWidth = 3;
        ctx.stroke();
    }

    function animate() {
        if (!gameRunning || isPaused) return; // Стоп если пауза или конец
        update();
        draw();
        requestAnimationFrame(animate);
    }

    // Первый рендер
    draw();
</script>

</body>
</html>
